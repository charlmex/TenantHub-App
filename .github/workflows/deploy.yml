name: Deploy TenantHub API

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: tenanthub-api
  AWS_ACCOUNT_ID: 204758923130

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t tenanthub-api \
            ./api

      - name: Tag Image
        run: |
          docker tag tenanthub-api:latest \
          204758923130.dkr.ecr.eu-central-1.amazonaws.com/tenanthub-api:latest

      - name: Push Image
        run: |
          docker push \
          204758923130.dkr.ecr.eu-central-1.amazonaws.com/tenanthub-api:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster tenanthub-cluster \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
